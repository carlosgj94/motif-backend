services:
  content-renderer:
    build:
      context: ../..
      dockerfile: services/content-renderer/Dockerfile
    container_name: motif-content-renderer
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:8788:8788"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8788/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
